<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8A4C8"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#F8A4C8"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
  <!-- Inner rotating connection lines -->
  <path d="M32 10 L32 22" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 42 L32 54" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M10 32 L22 32" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 32 L54 32" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagonal lines -->
  <path d="M16 16 L24 24" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M40 40 L48 48" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M48 16 L40 24" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M24 40 L16 48" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Center Polaris star -->
  <polygon points="32,18 35,28 45,28 37,34 40,44 32,38 24,44 27,34 19,28 29,28" fill="url(#grad2)"/>
  <!-- Center core -->
  <circle cx="32" cy="32" r="4" fill="#1E1E2E" stroke="url(#grad)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="1.5" fill="url(#grad)"/>
</svg>